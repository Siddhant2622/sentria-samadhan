services:
  # ── BACKEND (Node.js + SQLite) ──
  - type: web
    name: sentria-samadhan-backend
    env: node
    rootDir: backend
    buildCommand: npm install --build-from-source
    startCommand: npm start
    autoDeploy: true
    disk:
      name: sentria-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 3001
      - key: DB_PATH
        value: /data/sentria.db
      - key: GEMINI_API_KEY
        sync: false

  # ── FRONTEND (Vite PWA) ──
  - type: web
    name: sentria-samadhan-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://sentria-samadhan-backend.onrender.com
