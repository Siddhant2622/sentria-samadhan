services:
  # ── BACKEND (Node.js + SQLite) ──
  - type: web
    name: sentria-samadhan-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm rebuild sqlite3
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3001
      - key: GEMINI_API_KEY
        sync: false 

  # ── FRONTEND (Vite PWA) ──
  - type: web
    name: sentria-samadhan-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: sentria-samadhan-backend
          type: web
          property: host
