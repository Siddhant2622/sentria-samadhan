<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA / Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sentria Samadhan" />

    <meta name="msapplication-navbutton-color" content="#F5F0E8" />

    <!-- SEO -->
    <title>Sentria Samadhan — Smart Citizen Grievance System</title>

    <!-- Icons for Apple/Android home screen -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
          console.log('Force uninstalled service worker to clear cache.');
        }
      });
    }
  </script>
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <!-- Splash screens for iOS (optional, improves feel) -->
